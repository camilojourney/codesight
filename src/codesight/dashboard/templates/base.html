<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "CodeSight Admin" }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      :root {
        --bg: #f4f6fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #d8dde7;
        --sidebar: #0f172a;
        --sidebar-text: #e2e8f0;
        --accent: #2563eb;
        --ok: #15803d;
        --error: #b91c1c;
        --syncing: #b45309;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        background: var(--sidebar);
        color: var(--sidebar-text);
        padding: 24px 16px;
      }
      .brand {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 24px;
      }
      .nav-link {
        display: block;
        color: var(--sidebar-text);
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .nav-link:hover { background: rgba(255, 255, 255, 0.1); }
      .logout-form { margin-top: 20px; }
      .logout-button {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: transparent;
        color: var(--sidebar-text);
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
      }
      .content {
        padding: 24px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 16px;
      }
      h1, h2, h3 { margin-top: 0; }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th,
      .table td {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        text-transform: lowercase;
      }
      .badge.never { background: #e5e7eb; color: #374151; }
      .badge.syncing { background: #fef3c7; color: var(--syncing); }
      .badge.ok { background: #dcfce7; color: var(--ok); }
      .badge.error { background: #fee2e2; color: var(--error); }
      .message {
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 12px;
      }
      .message.success { background: #dcfce7; color: #166534; }
      .message.error { background: #fee2e2; color: #991b1b; }
      .muted { color: var(--muted); }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      .field { display: flex; flex-direction: column; gap: 6px; flex: 1 1 220px; }
      input, textarea, select, button {
        font: inherit;
      }
      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fff;
      }
      button, .button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        text-decoration: none;
      }
      .button.secondary,
      button.secondary {
        background: #fff;
        color: var(--text);
        border-color: var(--line);
      }
      .inline-form {
        display: inline;
      }
      .danger {
        background: #fff;
        border-color: #ef4444;
        color: #b91c1c;
      }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">CodeSight Admin</div>
        <a class="nav-link" href="/">Workspaces</a>
        <a class="nav-link" href="/analytics">Analytics</a>
        <form class="logout-form" method="post" action="/logout">
          <button class="logout-button" type="submit">Logout</button>
        </form>
      </aside>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
